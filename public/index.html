<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlipBoard TV</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background: #1a1a1a;
        }

        .board {
            display: grid;
            grid-template-columns: repeat(10, 1fr);
            grid-template-rows: repeat(4, 1fr);
            gap: 2.2vw;
            padding: 8vw;
            width: 100vw;
            height: 100vh;
        }

        .tile {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 4px;
            overflow: hidden;
            user-select: none;

            /* Recessed well — sunk into the board surface */
            background: #141414;
            border-top: 2px solid #0a0a0a;
            border-left: 2px solid #0a0a0a;
            border-bottom: 2px solid #3a3a3a;
            border-right: 2px solid #3a3a3a;
            box-shadow:
                inset 4px 4px 12px rgba(0, 0, 0, 0.9),
                inset 2px 2px 6px rgba(0, 0, 0, 0.7),
                inset -1px -1px 4px rgba(255, 255, 255, 0.03);
        }

        /* The split line — where the flap halves meet */
        .tile::after {
            content: '';
            position: absolute;
            left: 5%;
            right: 5%;
            top: 50%;
            height: 3px;
            background: #000;
            box-shadow: 0 1px 0 rgba(255, 255, 255, 0.05);
            z-index: 2;
        }

        .char {
            position: relative;
            z-index: 1;
            font-family: 'SF Mono', 'Menlo', 'Consolas', 'Courier New', monospace;
            font-size: 12vh;
            font-weight: 400;
            color: #ffffff;
            line-height: 1;
        }
    </style>
</head>
<body>
    <div class="board" id="board"></div>

    <script>
        const ROWS = 4;
        const COLS = 10;
        const FLIP_CHARS = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789!#&-+';

        /* ── Build the board ── */
        const board = document.getElementById('board');
        const tiles = [];

        for (let r = 0; r < ROWS; r++) {
            tiles[r] = [];
            for (let c = 0; c < COLS; c++) {
                const tile = document.createElement('div');
                tile.className = 'tile';
                tile.innerHTML = '<span class="char"> </span>';
                board.appendChild(tile);
                tiles[r][c] = tile.querySelector('.char');
            }
        }

        /* ── Word wrap + center ── */
        function layoutMessage(text) {
            text = text.toUpperCase();
            const words = text.split(/\s+/);
            const lines = [];
            let line = '';

            for (const word of words) {
                if (word.length > COLS) {
                    if (line) lines.push(line);
                    lines.push(word.slice(0, COLS));
                    line = '';
                    continue;
                }
                if (line.length + word.length + (line ? 1 : 0) > COLS) {
                    lines.push(line);
                    line = word;
                } else {
                    line += (line ? ' ' : '') + word;
                }
            }
            if (line) lines.push(line);

            // Build target grid — centered vertically and horizontally
            const startRow = Math.max(0, Math.floor((ROWS - lines.length) / 2));
            const grid = [];

            for (let r = 0; r < ROWS; r++) {
                grid[r] = [];
                const li = r - startRow;
                const text = (li >= 0 && li < lines.length) ? lines[li] : '';
                const pad = Math.floor((COLS - text.length) / 2);
                for (let c = 0; c < COLS; c++) {
                    const ci = c - pad;
                    grid[r][c] = (ci >= 0 && ci < text.length) ? text[ci] : ' ';
                }
            }
            return grid;
        }

        /* ── Flip animation for a single tile ── */
        function flipTile(charEl, target, delay) {
            const current = charEl.textContent;
            if (current === target) return;

            const steps = 8 + Math.floor(Math.random() * 6);
            const schedule = [];
            let t = 0;

            for (let i = 0; i < steps; i++) {
                t += 25 + Math.pow(i, 1.4) * 4;
                schedule.push(t);
            }

            schedule.forEach((time, i) => {
                setTimeout(() => {
                    if (i < schedule.length - 1) {
                        charEl.textContent = FLIP_CHARS[Math.floor(Math.random() * FLIP_CHARS.length)];
                    } else {
                        charEl.textContent = target;
                    }
                }, delay + time);
            });
        }

        /* ── Set a message on the board ── */
        function setMessage(text) {
            const grid = layoutMessage(text);
            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c < COLS; c++) {
                    const delay = (r * COLS + c) * 18;
                    flipTile(tiles[r][c], grid[r][c], delay);
                }
            }
        }

        /* ── Kick it off ── */
        setTimeout(() => setMessage('Welcome to FlipBoard'), 400);
    </script>
</body>
</html>
