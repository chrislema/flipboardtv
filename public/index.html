<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlipBoard TV</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background: #1a1a1a;
        }

        .board {
            display: grid;
            grid-template-columns: repeat(12, 1fr);
            grid-template-rows: repeat(6, 1fr);
            gap: 1.8vw;
            padding: 6.8vw;
            width: 100vw;
            height: 100vh;
        }

        .tile {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 4px;
            overflow: hidden;
            user-select: none;

            /* Recessed well — sunk into the board surface */
            background: #141414;
            border-top: 2px solid #0a0a0a;
            border-left: 2px solid #0a0a0a;
            border-bottom: 2px solid #3a3a3a;
            border-right: 2px solid #3a3a3a;
            box-shadow:
                inset 4px 4px 12px rgba(0, 0, 0, 0.9),
                inset 2px 2px 6px rgba(0, 0, 0, 0.7),
                inset -1px -1px 4px rgba(255, 255, 255, 0.03);
        }

        /* The split line — where the flap halves meet */
        .tile::after {
            content: '';
            position: absolute;
            left: 5%;
            right: 5%;
            top: 50%;
            height: 5px;
            background: #000;
            box-shadow: 0 1px 0 rgba(255, 255, 255, 0.05);
            z-index: 2;
        }

        .char {
            position: relative;
            z-index: 1;
            font-family: 'SF Mono', 'Menlo', 'Consolas', 'Courier New', monospace;
            font-size: 8.5vh;
            font-weight: 300;
            color: #ffffff;
            line-height: 1;
        }
    </style>
</head>
<body>
    <div class="board" id="board"></div>

    <script>
        const ROWS = 6;
        const COLS = 12;
        const FLIP_CHARS = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789!#&-+';

        /* ── Build the board ── */
        const board = document.getElementById('board');
        const tiles = [];

        for (let r = 0; r < ROWS; r++) {
            tiles[r] = [];
            for (let c = 0; c < COLS; c++) {
                const tile = document.createElement('div');
                tile.className = 'tile';
                tile.innerHTML = '<span class="char"> </span>';
                board.appendChild(tile);
                tiles[r][c] = tile.querySelector('.char');
            }
        }

        /* ── Tokenize: merge standalone dashes/colons with previous word ── */
        function tokenize(text) {
            const raw = text.toUpperCase().trim().split(/\s+/);
            const tokens = [];
            for (const w of raw) {
                if ((w === '-' || w === '--' || w === ':') && tokens.length > 0) {
                    tokens[tokens.length - 1] += ' ' + w;
                } else {
                    tokens.push(w);
                }
            }
            return tokens;
        }

        /* ── Minimum-raggedness line breaking (TeX-style) ── */
        function wrapBalanced(tokens) {
            const n = tokens.length;
            if (n === 0) return [];

            const dp = new Array(n + 1).fill(Infinity);
            const breaks = new Array(n + 1).fill(0);
            dp[n] = 0;

            for (let i = n - 1; i >= 0; i--) {
                let len = 0;
                for (let j = i; j < n; j++) {
                    len += tokens[j].length + (j > i ? 1 : 0);
                    if (len > COLS) break;
                    const slack = COLS - len;
                    const cost = (j === n - 1) ? 0 : slack * slack;
                    if (dp[j + 1] + cost < dp[i]) {
                        dp[i] = dp[j + 1] + cost;
                        breaks[i] = j + 1;
                    }
                }
            }

            const lines = [];
            let idx = 0;
            while (idx < n) {
                lines.push(tokens.slice(idx, breaks[idx]).join(' '));
                idx = breaks[idx];
            }
            return lines;
        }

        /* ── Layout message onto the grid ── */
        function layoutMessage(text) {
            const tokens = tokenize(text);
            const lines = wrapBalanced(tokens);

            const startRow = Math.max(0, Math.floor((ROWS - lines.length) / 2));
            const grid = [];

            for (let r = 0; r < ROWS; r++) {
                grid[r] = [];
                const li = r - startRow;
                const lineText = (li >= 0 && li < lines.length) ? lines[li] : '';
                const pad = Math.floor((COLS - lineText.length) / 2);
                for (let c = 0; c < COLS; c++) {
                    const ci = c - pad;
                    grid[r][c] = (ci >= 0 && ci < lineText.length) ? lineText[ci] : ' ';
                }
            }
            return grid;
        }

        /* ── Flip animation for a single tile ── */
        function flipTile(charEl, target, delay) {
            const current = charEl.textContent;
            if (current === target) return;

            const steps = 8 + Math.floor(Math.random() * 6);
            const schedule = [];
            let t = 0;

            for (let i = 0; i < steps; i++) {
                t += 25 + Math.pow(i, 1.4) * 4;
                schedule.push(t);
            }

            schedule.forEach((time, i) => {
                setTimeout(() => {
                    if (i < schedule.length - 1) {
                        charEl.textContent = FLIP_CHARS[Math.floor(Math.random() * FLIP_CHARS.length)];
                    } else {
                        charEl.textContent = target;
                    }
                }, delay + time);
            });
        }

        /* ── Set a message on the board ── */
        function setMessage(text) {
            const grid = layoutMessage(text);
            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c < COLS; c++) {
                    const delay = (r * COLS + c) * 18;
                    flipTile(tiles[r][c], grid[r][c], delay);
                }
            }
        }

        /* ── Poll the API for new messages ── */
        const API_URL = 'https://message.flipboardtv.com/message';
        let currentMessage = '';

        async function pollMessage() {
            try {
                const res = await fetch(API_URL);
                const data = await res.json();
                if (data.message && data.message !== currentMessage) {
                    currentMessage = data.message;
                    setMessage(currentMessage);
                }
            } catch (e) { /* silent retry next poll */ }
        }

        // Show welcome, then start polling
        setMessage('Welcome to FlipBoard');
        setTimeout(() => {
            pollMessage();
            setInterval(pollMessage, 5000);
        }, 2000);
    </script>
</body>
</html>
